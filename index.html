<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Loan EMI Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; }
    body { background: #f5f5f5; padding: 30px; color: #333; }
    .main-container { max-width: 1400px; margin: auto; display: flex; flex-direction: column; gap: 28px; }
    .calculator-card {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }
    .left-section { padding: 40px 50px; background: #fafafa; }
    .right-section { padding: 40px 50px; background: #edf6f6; display: flex; flex-direction: column; justify-content: center; }
    .field-group { margin-bottom: 35px; }
    label { display: block; font-size: 18px; color: #666; margin-bottom: 12px; }
    input, select {
      width: 100%; border: none; border-bottom: 2px solid #d6d6d6; background: transparent;
      font-size: 22px; padding: 10px 0; outline: none; color: #333;
    }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
    .btn {
      margin-top: 20px; width: 100%; background: #e31e24; color: white; border: none; border-radius: 40px;
      padding: 20px; font-size: 20px; font-weight: bold; cursor: pointer; transition: 0.3s ease;
    }
    .btn:hover { background: #c8181d; }
    .result-title { font-size: 28px; margin-bottom: 30px; color: #333; text-align: center; }
    .result-title span { font-weight: 700; margin-left: 10px; }
    .chart-and-info { display: flex; align-items: center; justify-content: center; gap: 50px; flex-wrap: wrap; }
    .donut-wrap { width: 220px; height: 220px; position: relative; }
    .donut { width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(#0b9d8a 0deg, #0b9d8a 220deg, #f4c32f 220deg, #f4c32f 360deg); position: relative; }
    .donut::before {
      content: ""; position: absolute; top: 50%; left: 50%; width: 105px; height: 105px;
      background: #edf6f6; border-radius: 50%; transform: translate(-50%, -50%);
    }
    .legend { display: flex; flex-direction: column; gap: 30px; }
    .legend-item { display: flex; align-items: flex-start; gap: 16px; }
    .color-box { width: 28px; height: 28px; border-radius: 4px; margin-top: 4px; flex-shrink: 0; }
    .green { background: #0b9d8a; }
    .yellow { background: #f4c32f; }
    .legend-text .label { font-size: 18px; color: #555; margin-bottom: 6px; }
    .legend-text .value { font-size: 24px; font-weight: 700; }
    .bottom-line { margin-top: 35px; border-top: 2px solid #c9d9dc; padding-top: 20px; text-align: center; font-size: 16px; color: #666; }

    .schedule-card {
      background: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); padding: 30px;
    }
    .schedule-title { font-size: 30px; font-weight: 700; margin-bottom: 28px; }
    .year-tabs {
      display: flex; gap: 16px; overflow-x: auto; border-bottom: 1px solid #ddd; padding-bottom: 0; margin-bottom: 0;
      scrollbar-width: none;
    }
    .year-tabs::-webkit-scrollbar { display: none; }
    .year-tab {
      background: transparent; border: none; font-size: 18px; color: #444; padding: 14px 30px 16px; cursor: pointer;
      position: relative; font-weight: 500;
    }
    .year-tab.active { font-weight: 700; }
    .year-tab.active::after {
      content: ""; position: absolute; left: 0; right: 0; bottom: -1px; height: 6px; background: #e31e24; border-radius: 6px;
    }
    .table-wrap {
      border: 1px solid #d8d8d8; border-radius: 14px; overflow: hidden; margin-top: 0;
    }
    .table-scroll {
      max-height: 520px; overflow: auto; background: #fff;
    }
    table { width: 100%; border-collapse: collapse; min-width: 1100px; }
    thead th {
      position: sticky; top: 0; background: #fff; z-index: 1; text-align: left; padding: 22px 24px; font-size: 16px; border-bottom: 1px solid #ddd;
    }
    tbody td { padding: 22px 24px; font-size: 16px; border-bottom: 1px solid #e7e7e7; }
    tbody tr:last-child td { border-bottom: none; }

    @media (max-width: 900px) {
      body { padding: 16px; }
      .calculator-card { grid-template-columns: 1fr; }
      .row { grid-template-columns: 1fr; gap: 20px; }
      .left-section, .right-section { padding: 30px 25px; }
      .result-title { font-size: 24px; }
      .schedule-card { padding: 18px; }
      .schedule-title { font-size: 24px; }
      .year-tab { padding: 12px 18px 16px; }
    }
  </style>
</head>
<body>
  <div class="main-container">
    <div class="calculator-card">
      <div class="left-section">
        <div class="field-group">
          <label for="calculationMode">Calculation Type</label>
          <select id="calculationMode" onchange="handleModeChange()">
            <option value="loan" selected>Calculate EMI from Loan Amount</option>
            <option value="emi">Calculate Loan Amount from EMI</option>
            <option value="tenure">Calculate Tenure from Loan Amount + EMI</option>
          </select>
        </div>

        <div class="field-group" id="loanAmountGroup">
          <label for="loanAmount">Loan Amount</label>
          <input type="number" id="loanAmount" value="4000000" />
        </div>

        <div class="field-group" id="desiredEmiGroup" style="display: none;">
          <label for="desiredEmi">Desired EMI</label>
          <input type="number" id="desiredEmi" value="52860" />
        </div>

        <div class="row" id="tenureRow">
          <div class="field-group">
            <label for="loanTenure">Loan Tenure</label>
            <select id="loanTenure">
              <option value="5">5 yrs</option>
              <option value="10" selected>10 yrs</option>
              <option value="15">15 yrs</option>
              <option value="20">20 yrs</option>
              <option value="25">25 yrs</option>
              <option value="30">30 yrs</option>
            </select>
          </div>

          <div class="field-group">
            <label for="interestRate">Interest Rate % (p.a.)</label>
            <input type="number" id="interestRate" value="10" step="0.1" />
          </div>
        </div>

        <button class="btn" onclick="updateCalculator()">Recalculate</button>
      </div>

      <div class="right-section">
        <div class="result-title">
          You are Eligible for EMI Amount <span id="emiAmount">₹52,860</span>
        </div>

        <div class="chart-and-info">
          <div class="donut-wrap">
            <div class="donut" id="donutChart"></div>
          </div>

          <div class="legend">
            <div class="legend-item">
              <div class="color-box green"></div>
              <div class="legend-text">
                <div class="label">Principal Amount</div>
                <div class="value" id="principalAmount">₹40,00,000</div>
              </div>
            </div>

            <div class="legend-item">
              <div class="color-box yellow"></div>
              <div class="legend-text">
                <div class="label">Interest Amount</div>
                <div class="value" id="interestAmount">₹23,43,236</div>
              </div>
            </div>
          </div>
        </div>

        <div class="bottom-line" id="totalPayment">Total Payment: ₹63,43,236</div>
      </div>
    </div>

    <div class="schedule-card">
      <div class="schedule-title">Your Repayment Details</div>
      <div class="year-tabs" id="yearTabs"></div>
      <div class="table-wrap">
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>Month</th>
                <th>Beginning Loan Balance</th>
                <th>EMI</th>
                <th>Principal</th>
                <th>Monthly Interest</th>
                <th>Outstanding Balances</th>
              </tr>
            </thead>
            <tbody id="scheduleTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    let amortizationData = [];
    let activeYear = null;

    function formatINR(number) {
      return '₹' + Math.round(Number(number)).toLocaleString('en-IN');
    }

    function calculateEMI(principal, annualRate, years) {
      const monthlyRate = annualRate / 12 / 100;
      const months = years * 12;

      if (months === 0) {
        return { emi: 0, totalPayment: 0, totalInterest: 0 };
      }

      if (monthlyRate === 0) {
        const emi = principal / months;
        return { emi, totalPayment: emi * months, totalInterest: 0 };
      }

      const emi = (principal * monthlyRate * Math.pow(1 + monthlyRate, months)) /
                  (Math.pow(1 + monthlyRate, months) - 1);
      const totalPayment = emi * months;
      const totalInterest = totalPayment - principal;

      return { emi, totalPayment, totalInterest };
    }

    function calculateLoanFromEMI(emi, annualRate, years) {
      const monthlyRate = annualRate / 12 / 100;
      const months = years * 12;

      if (months === 0) {
        return 0;
      }

      if (monthlyRate === 0) {
        return emi * months;
      }

      const numerator = emi * (Math.pow(1 + monthlyRate, months) - 1);
      const denominator = monthlyRate * Math.pow(1 + monthlyRate, months);
      return numerator / denominator;
    }

    function calculateTenureFromLoanAndEMI(principal, emi, annualRate) {
      const monthlyRate = annualRate / 12 / 100;

      if (principal <= 0 || emi <= 0) {
        return { years: 0, months: 0, totalMonths: 0, valid: false };
      }

      if (monthlyRate === 0) {
        const totalMonths = Math.ceil(principal / emi);
        return {
          years: totalMonths / 12,
          months: totalMonths,
          totalMonths,
          valid: true
        };
      }

      if (emi <= principal * monthlyRate) {
        return { years: 0, months: 0, totalMonths: 0, valid: false };
      }

      const totalMonths = Math.log(emi / (emi - principal * monthlyRate)) / Math.log(1 + monthlyRate);
      return {
        years: totalMonths / 12,
        months: Math.ceil(totalMonths),
        totalMonths: Math.ceil(totalMonths),
        valid: true
      };
    }

    function handleModeChange() {
      const mode = document.getElementById('calculationMode').value;
      document.getElementById('loanAmountGroup').style.display = (mode === 'loan' || mode === 'tenure') ? 'block' : 'none';
      document.getElementById('desiredEmiGroup').style.display = (mode === 'emi' || mode === 'tenure') ? 'block' : 'none';
      document.getElementById('tenureRow').style.display = mode === 'tenure' ? 'none' : 'grid';
      updateCalculator();
    }

    function generateAmortizationSchedule(principal, annualRate, years) {
      const monthlyRate = annualRate / 12 / 100;
      const months = years * 12;
      const { emi } = calculateEMI(principal, annualRate, years);
      const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
      const startYear = new Date().getFullYear();
      const data = [];
      let balance = principal;

      for (let i = 0; i < months; i++) {
        const monthIndex = i % 12;
        const year = startYear + Math.floor(i / 12);
        const beginningBalance = balance;
        const interest = monthlyRate === 0 ? 0 : balance * monthlyRate;
        let principalPaid = emi - interest;
        if (i === months - 1 || principalPaid > balance) {
          principalPaid = balance;
        }
        const emiPaid = principalPaid + interest;
        balance = Math.max(0, balance - principalPaid);

        data.push({
          year,
          month: monthNames[monthIndex],
          beginningBalance,
          emi: emiPaid,
          principalPaid,
          interest,
          outstandingBalance: balance
        });
      }
      return data;
    }

    function renderYearTabs(years) {
      const tabs = document.getElementById('yearTabs');
      tabs.innerHTML = '';

      years.forEach((year, index) => {
        const btn = document.createElement('button');
        btn.className = 'year-tab' + (year === activeYear ? ' active' : '');
        btn.textContent = year;
        btn.onclick = () => {
          activeYear = year;
          renderYearTabs(years);
          renderScheduleTable();
        };
        tabs.appendChild(btn);
      });

      if (!activeYear && years.length) {
        activeYear = years[0];
        renderYearTabs(years);
      }
    }

    function renderScheduleTable() {
      const tbody = document.getElementById('scheduleTableBody');
      tbody.innerHTML = '';

      const filtered = amortizationData.filter(item => item.year === activeYear);
      filtered.forEach(item => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${item.month}</td>
          <td>${formatINR(item.beginningBalance)}</td>
          <td>${formatINR(item.emi)}</td>
          <td>${formatINR(item.principalPaid)}</td>
          <td>${formatINR(item.interest)}</td>
          <td>${formatINR(item.outstandingBalance)}</td>
        `;
        tbody.appendChild(row);
      });
    }

    function updateCalculator() {
      const mode = document.getElementById('calculationMode').value;
      let years = parseFloat(document.getElementById('loanTenure').value) || 0;
      const annualRate = parseFloat(document.getElementById('interestRate').value) || 0;

      let principal = 0;
      let result = null;

      if (mode === 'loan') {
        principal = parseFloat(document.getElementById('loanAmount').value) || 0;
        result = calculateEMI(principal, annualRate, years);
        document.querySelector('.result-title').innerHTML = `You are Eligible for EMI Amount <span id="emiAmount">${formatINR(result.emi)}</span>`;
      } else if (mode === 'emi') {
        const desiredEmi = parseFloat(document.getElementById('desiredEmi').value) || 0;
        principal = calculateLoanFromEMI(desiredEmi, annualRate, years);
        document.getElementById('loanAmount').value = Math.round(principal);
        result = calculateEMI(principal, annualRate, years);
        document.querySelector('.result-title').innerHTML = `You are Eligible for Loan Amount <span id="emiAmount">${formatINR(principal)}</span>`;
      } else {
        principal = parseFloat(document.getElementById('loanAmount').value) || 0;
        const desiredEmi = parseFloat(document.getElementById('desiredEmi').value) || 0;
        const tenureResult = calculateTenureFromLoanAndEMI(principal, desiredEmi, annualRate);

        if (!tenureResult.valid) {
          document.querySelector('.result-title').innerHTML = `Please enter a higher EMI amount <span id="emiAmount">than monthly interest</span>`;
          document.getElementById('principalAmount').textContent = formatINR(principal);
          document.getElementById('interestAmount').textContent = formatINR(0);
          document.getElementById('totalPayment').textContent = 'Total Payment: ' + formatINR(0);
          amortizationData = [];
          document.getElementById('yearTabs').innerHTML = '';
          document.getElementById('scheduleTableBody').innerHTML = '';
          document.getElementById('donutChart').style.background = 'conic-gradient(#0b9d8a 0deg, #0b9d8a 360deg, #f4c32f 360deg, #f4c32f 360deg)';
          return;
        }

        years = tenureResult.years;
        result = calculateEMI(principal, annualRate, years);
        result.emi = desiredEmi;
        result.totalPayment = desiredEmi * tenureResult.totalMonths;
        result.totalInterest = result.totalPayment - principal;
        document.querySelector('.result-title').innerHTML = `Estimated Loan Tenure <span id="emiAmount">${tenureResult.totalMonths} months</span>`;
      }

      document.getElementById('principalAmount').textContent = formatINR(principal);
      document.getElementById('interestAmount').textContent = formatINR(result.totalInterest);
      document.getElementById('totalPayment').textContent = 'Total Payment: ' + formatINR(result.totalPayment);

      const principalAngle = result.totalPayment > 0 ? (principal / result.totalPayment) * 360 : 0;
      document.getElementById('donutChart').style.background = `conic-gradient(#0b9d8a 0deg, #0b9d8a ${principalAngle}deg, #f4c32f ${principalAngle}deg, #f4c32f 360deg)`;

      amortizationData = generateAmortizationSchedule(principal, annualRate, years);
      if (mode === 'tenure') {
        const desiredEmi = parseFloat(document.getElementById('desiredEmi').value) || 0;
        amortizationData = amortizationData.map(item => ({ ...item, emi: desiredEmi }));
      }
      const uniqueYears = [...new Set(amortizationData.map(item => item.year))];
      if (!uniqueYears.includes(activeYear)) {
        activeYear = uniqueYears[0] || null;
      }
      renderYearTabs(uniqueYears);
      renderScheduleTable();
    }

    handleModeChange();
  </script>
</body>
</html>
